<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErogameScape Music Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="titlebar"></div>
  
  <div class="container">

    <div class="search-container">
      <div class="tabs source-tabs mb-2" style="margin-bottom: 10px;">
        <button class="tab source-tab active" data-source="erogamescape">ErogameScape (Galgame)</button>
        <button class="tab source-tab" data-source="bangumi">Bangumi (Anime/General)</button>
      </div>

      <div class="tabs direction-tabs" style="margin-bottom: 12px;">
        <button class="tab direction-tab active" data-mode="gameToMusic">Work &rarr; Music</button>
        <button class="tab direction-tab" data-mode="musicToGame">Music &rarr; Work</button>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Enter game name..." autofocus>
        <button id="searchBtn">Search</button>
      </div>
    </div>

    <div id="loader" class="hidden">
      <span>Querying...</span>
    </div>

    <div id="errorBox" class="hidden"></div>

    <div class="results-container">
      <div id="noResults" class="hidden">
        <p>No results found.</p>
      </div>

      <table id="resultsTable" class="hidden">
        <thead>
          <tr id="tableHeaderRow"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
